steps:
  - name: node:20
    entrypoint: npm
    args: [ci]

  - name: node:20
    entrypoint: npm
    args: [run, lint]

  - name: node:20
    entrypoint: npm
    args: [run, build]

  - name: node:20
    entrypoint: npm
    args: [test]

artifacts:
  objects:
    location: gs://$PROJECT_ID-artifacts/tactile-dialogue/$BUILD_ID/
    paths:
      - dist/**

options:
  logging: CLOUD_LOGGING_ONLY
